<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>משחק הקפיצות של אבא ואורי</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1rem;
        background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 4vw, 2rem);
        letter-spacing: 0.05em;
      }
      #game-container {
        max-width: 100%;
        border: 4px solid #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        line-height: 0;
      }
      #jump-button {
        padding: 1rem 3rem;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        background: #ff6b35;
        color: #fff;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        touch-action: manipulation;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 6px 0 #c44a1a;
        transition: transform 60ms ease, box-shadow 60ms ease;
      }
      #jump-button:active {
        transform: translateY(6px);
        box-shadow: 0 0 0 #c44a1a;
      }
      .hint {
        font-size: 0.9rem;
        opacity: 0.7;
      }
      #quiz-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
      }
      #quiz-modal.show {
        display: flex;
      }
      .quiz-box {
        background: #fff;
        color: #1a1a2e;
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        text-align: center;
        max-width: 90vw;
        width: 380px;
      }
      #quiz-question {
        font-size: 1.6rem;
        font-weight: 800;
        margin: 0 0 1.25rem;
      }
      #quiz-answer {
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1.5rem;
        text-align: center;
        border: 3px solid #1a1a2e;
        border-radius: 10px;
        outline: none;
      }
      #quiz-answer:focus {
        border-color: #ff6b35;
      }
      #quiz-submit {
        margin-top: 1.25rem;
        padding: 0.75rem 2.5rem;
        font-size: 1.25rem;
        font-weight: 800;
        background: #ff6b35;
        color: #fff;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 5px 0 #c44a1a;
      }
      #quiz-submit:active {
        transform: translateY(5px);
        box-shadow: 0 0 0 #c44a1a;
      }
      #quiz-feedback {
        min-height: 1.4rem;
        margin: 0.85rem 0 0;
        font-size: 1.1rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1 dir="rtl">משחק הקפיצות של אבא ואורי</h1>
    <div id="game-container"></div>
    <button id="jump-button" type="button">קפיצה</button>
    <p class="hint" dir="rtl">לחץ על רווח או על קפיצה</p>

    <div id="quiz-modal">
      <form class="quiz-box" id="quiz-form" dir="rtl">
        <p id="quiz-question"></p>
        <input
          id="quiz-answer"
          type="number"
          inputmode="numeric"
          autocomplete="off"
        />
        <button id="quiz-submit" type="submit">בדוק</button>
        <p id="quiz-feedback"></p>
      </form>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
